<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - PKSB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, rgba(1, 65, 28, 0.95) 0%, rgba(10, 110, 58, 0.9) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .login-container {
            background: white;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 400px;
        }

        .login-container h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1A1A1A;
            text-align: center;
        }

        .login-container p {
            text-align: center;
            color: #718096;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1A1A1A;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #01411C;
            box-shadow: 0 0 0 3px rgba(1, 65, 28, 0.1);
        }

        button {
            width: 100%;
            padding: 12px 16px;
            background: #01411C;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #0A6E3A;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(1, 65, 28, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #FEE;
            color: #C33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid #FCC;
            display: none;
        }

        .success {
            background: #EFE;
            color: #3C3;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid #CFC;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 16px 0;
        }

        .spinner {
            border: 3px solid #E2E8F0;
            border-top: 3px solid #01411C;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #F0F9FF;
            border-left: 4px solid #0A6E3A;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 12px;
            color: #1A1A1A;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<script src="config.js"></script>

<div class="login-container">
    <h1>Admin Portal</h1>
    <p>PKSB Braunschweig</p>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <button type="submit" id="loginBtn">Sign In</button>
    </form>

    <div class="info-box">
        ℹ️ <strong>Session Note:</strong> Your login session will automatically end when you close this browser window.
    </div>
</div>

<script>
    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const loading = document.getElementById('loading');

    // Check if already logged in
    if (sessionStorage.getItem('adminToken')) {
        window.location.href = 'admin-dashboard.html';
    }

    function showError(message) {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
    }

    function showSuccess(message) {
        successMsg.textContent = message;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
            showError('Please enter username and password');
            return;
        }

        loginBtn.disabled = true;
        loading.style.display = 'block';
        errorMsg.style.display = 'none';

        try {
            // Get admin credentials from window config
            // These are set as environment variables at build time
            const adminUsername = window.ADMIN_USERNAME;
            const adminPassword = window.ADMIN_PASSWORD;

            console.log('Login attempt:');
            console.log('  Entered username:', username);
            console.log('  Expected username:', adminUsername);
            console.log('  Credentials match:', username === adminUsername && password === adminPassword);

            if (!adminUsername || !adminPassword) {
                console.error('Config error: Missing credentials in window');
                showError('Server configuration error. Please contact administrator.');
                loginBtn.disabled = false;
                loading.style.display = 'none';
                return;
            }

            // Simple credential check
            if (username === adminUsername && password === adminPassword) {
                console.log('✓ Credentials match! Setting session...');
                showSuccess('Login successful! Redirecting...');
                // Use sessionStorage - auto-clears when browser closes
                sessionStorage.setItem('adminToken', 'authenticated');
                setTimeout(() => {
                    console.log('Redirecting to dashboard...');
                    window.location.href = 'admin-dashboard.html';
                }, 1000);
            } else {
                console.log('✗ Credentials do not match');
                showError('Invalid username or password');
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        } catch (err) {
            console.error('Login error:', err);
            showError('An error occurred. Please try again.');
            loginBtn.disabled = false;
            loading.style.display = 'none';
        }
    });
</script>

</body>
</html>
