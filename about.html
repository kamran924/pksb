<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - PKSB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="header-content">
        <h1>PKSB Braunschweig</h1>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="about.html" class="active">About</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<div class="container">
    <h2>About Us</h2>

    <div id="aboutContent" class="cards">
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #718096;">Loading...</div>
    </div>

    <h2 style="margin-top: 60px;">Our Team</h2>
    <div id="teamList" class="cards">
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #718096;">Loading...</div>
    </div>
</div>

<footer>
    <p>© 2026 PKSB Braunschweig</p>
</footer>
<script>
function toggleMenu() {
    const menu = document.getElementById("nav-menu");
    menu.classList.toggle("active");
}
</script>

<script type="module">
    import { getAboutSection, getTeam } from './api-client.js';

    async function loadAbout() {
        const sections = ['About Us', 'Mission', 'Vision', 'Values'];
        const aboutContent = document.getElementById('aboutContent');

        const content = await Promise.all(sections.map(s => getAboutSection(s)));
        const items = sections.map((name, idx) => ({ name, content: content[idx] })).filter(item => item.content);

        if (items.length === 0) {
            aboutContent.innerHTML = `
                <div class="card">
                    <h3>Who We Are</h3>
                    <p>PKSB is a vibrant community organization representing people of Pakistani origin in Braunschweig, Germany. We serve as a bridge between cultures, fostering connection and understanding.</p>
                </div>
                <div class="card">
                    <h3>Our Mission</h3>
                    <p>To create a welcoming space where Pakistani culture thrives while promoting integration and intercultural exchange in Braunschweig.</p>
                </div>
            `;
            return;
        }

        aboutContent.innerHTML = items.map(item => `
            <div class="card">
                <h3>${item.name}</h3>
                <p>${item.content}</p>
            </div>
        `).join('');
    }

    async function loadTeam() {
        const team = (await getTeam()).filter(member => member.isVisibleToPublic !== false);
        const teamList = document.getElementById('teamList');

        if (team.length === 0) {
            teamList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #718096;">No team members yet.</div>';
            return;
        }

        teamList.innerHTML = team.map(member => `
            <div class="card">
                ${member.image_url ? `<img src="${member.image_url}" alt="${member.name}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 16px;">` : ''}
                <h3>${member.name}</h3>
                <p><strong>${member.role}</strong></p>
                ${member.description ? `<p>${member.description}</p>` : ''}
            </div>
        `).join('');
    }

    loadAbout();
    loadTeam();
</script>

</body>
</html>
