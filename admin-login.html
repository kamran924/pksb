<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - PKSB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, rgba(1, 65, 28, 0.95) 0%, rgba(10, 110, 58, 0.9) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .login-container {
            background: white;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 400px;
        }

        .login-container h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1A1A1A;
            text-align: center;
        }

        .login-container p {
            text-align: center;
            color: #718096;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1A1A1A;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #01411C;
            box-shadow: 0 0 0 3px rgba(1, 65, 28, 0.1);
        }

        button {
            width: 100%;
            padding: 12px 16px;
            background: #01411C;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #0A6E3A;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(1, 65, 28, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #FEE;
            color: #C33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid #FCC;
            display: none;
        }

        .success {
            background: #EFE;
            color: #3C3;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid #CFC;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 16px 0;
        }

        .spinner {
            border: 3px solid #E2E8F0;
            border-top: 3px solid #01411C;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Admin Portal</h1>
    <p>PKSB Braunschweig</p>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <button type="submit" id="loginBtn">Sign In</button>
    </form>
</div>

<script type="module">
    import { supabase } from './supabase-client.js';

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const loading = document.getElementById('loading');

    if (localStorage.getItem('adminToken')) {
        window.location.href = 'admin-dashboard.html';
    }

    function showError(message) {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
    }

    function showSuccess(message) {
        successMsg.textContent = message;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
            showError('Please enter email and password');
            return;
        }

        loginBtn.disabled = true;
        loading.style.display = 'block';
        errorMsg.style.display = 'none';

        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                showError(error.message || 'Login failed');
                loginBtn.disabled = false;
                loading.style.display = 'none';
            } else if (data.session) {
                showSuccess('Login successful! Redirecting...');
                localStorage.setItem('adminToken', data.session.access_token);
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1000);
            }
        } catch (err) {
            showError('An error occurred. Please try again.');
            loginBtn.disabled = false;
            loading.style.display = 'none';
        }
    });
</script>

</body>
</html>
