<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - PKSB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="header-content">
        <h1>PKSB Braunschweig</h1>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="events.html" class="active">Events</a>
            <a href="contact.html">Contact</a>
            <a href="admin-login.html" style="margin-left: 20px; color: rgba(255,255,255,0.6);">Admin</a>
        </nav>
    </div>
</header>

<div class="container">
    <h2>Our Events</h2>

    <div id="eventsList" class="cards">
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #718096;">Loading...</div>
    </div>
</div>

<footer>
    <p>© 2026 PKSB Braunschweig</p>
</footer>
<script>
function toggleMenu() {
    const menu = document.getElementById("nav-menu");
    menu.classList.toggle("active");
}
</script>

<script type="module">
    import { getEvents } from './supabase-client.js';

    async function loadEvents() {
        const events = await getEvents();
        const eventsList = document.getElementById('eventsList');

        if (events.length === 0) {
            eventsList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #718096;">No events scheduled yet. Check back soon!</div>';
            return;
        }

        eventsList.innerHTML = events.map(event => `
            <div class="card">
                ${event.image_url ? `<img src="${event.image_url}" alt="${event.title}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 16px;">` : ''}
                <h3>${event.title}</h3>
                <p><strong>Date:</strong> ${new Date(event.date).toLocaleString()}</p>
                <p><strong>Location:</strong> ${event.location}</p>
                <p>${event.description}</p>
            </div>
        `).join('');
    }

    loadEvents();
</script>

</body>
</html>
